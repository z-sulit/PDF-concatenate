name: Release Windows App

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version, for example v1.0.0"
        required: true
        type: string

permissions:
  contents: write

jobs:
  release-windows:
    name: Build and publish Windows release
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Validate release version
        shell: pwsh
        env:
          RELEASE_VERSION: ${{ inputs.version }}
        run: |
          if ($env:RELEASE_VERSION -notmatch '^v\d+\.\d+\.\d+$') {
            Write-Error "Version must match vMAJOR.MINOR.PATCH, for example v1.0.0"
            exit 1
          }

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt pyinstaller

      - name: Validate Python syntax
        run: python -m py_compile pdf_concatenate.py

      - name: Build executable
        run: pyinstaller --onefile --windowed --name PDFConcatenator pdf_concatenate.py

      - name: Create checksum
        shell: pwsh
        run: |
          Get-FileHash dist/PDFConcatenator.exe -Algorithm SHA256 |
            ForEach-Object { "$($_.Hash)  PDFConcatenator.exe" } |
            Set-Content dist/PDFConcatenator.exe.sha256.txt

      - name: Create GitHub release
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_VERSION: ${{ inputs.version }}
        run: |
          gh release create $env:RELEASE_VERSION `
            dist/PDFConcatenator.exe `
            dist/PDFConcatenator.exe.sha256.txt `
            --title "PDF Concatenator $env:RELEASE_VERSION" `
            --notes "Download PDFConcatenator.exe, then double-click it to run the app."
