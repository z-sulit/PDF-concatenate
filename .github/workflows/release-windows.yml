name: Publish App Download

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish-app-download:
    name: Build and publish app download
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt pyinstaller

      - name: Validate Python syntax
        run: python -m py_compile pdf_concatenate.py

      - name: Build executable
        run: pyinstaller --onefile --windowed --name PDFConcatenator pdf_concatenate.py

      - name: Create checksum
        shell: pwsh
        run: |
          Get-FileHash dist/PDFConcatenator.exe -Algorithm SHA256 |
            ForEach-Object { "$($_.Hash)  PDFConcatenator.exe" } |
            Set-Content dist/PDFConcatenator.exe.sha256.txt

      - name: Create release notes
        shell: pwsh
        run: |
          @"
          Download **PDFConcatenator.exe** below, then double-click it to run the app.

          If Windows SmartScreen appears, choose **More info** and then **Run anyway**.
          "@ | Set-Content release-notes.md

      - name: Publish latest app download
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $tag = "pdf-concatenator-latest"
          $title = "PDF Concatenator - Latest Download"

          gh release view $tag *> $null
          if ($LASTEXITCODE -eq 0) {
            gh release upload $tag dist/PDFConcatenator.exe dist/PDFConcatenator.exe.sha256.txt --clobber
            gh release edit $tag --title $title --notes-file release-notes.md --latest
          }
          else {
            gh release create $tag dist/PDFConcatenator.exe dist/PDFConcatenator.exe.sha256.txt --title $title --notes-file release-notes.md --latest
          }
